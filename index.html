<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morea Hub</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: Arial; }
.hidden { display:none; }
</style>
</head>

<body class="bg-gray-100">

<!-- SIDEBAR -->
<div class="fixed left-0 top-0 h-full w-60 bg-gray-900 text-white p-4">
<h1 class="text-xl font-bold mb-6">Morea Hub</h1>

<button onclick="showSection('dashboard')" class="block mb-2">Dashboard</button>
<button onclick="showSection('ordini')" class="block mb-2">Ordini</button>
<button onclick="showSection('audio')" class="block mb-2">Audio</button>
</div>

<!-- MAIN -->
<div class="ml-64 p-6">

<!-- DASHBOARD -->
<div id="dashboard">
<h2 class="text-2xl font-bold mb-4">Dashboard</h2>

<p>Benvenuto nel tuo gestionale 🚀</p>

</div>

<!-- ORDINI -->
<div id="ordini" class="hidden">

<h2 class="text-2xl font-bold mb-4">Ordini</h2>

<input id="cliente" placeholder="Cliente" class="border p-2 mr-2">
<input id="prodotto" placeholder="Prodotto" class="border p-2 mr-2">
<input id="prezzo" placeholder="Prezzo" class="border p-2 mr-2">

<button onclick="aggiungiOrdine()" class="bg-blue-600 text-white px-4 py-2">Aggiungi</button>

<table class="mt-4 w-full bg-white">
<thead>
<tr>
<th>ID</th>
<th>Cliente</th>
<th>Prodotto</th>
<th>Prezzo</th>
</tr>
</thead>

<tbody id="listaOrdini"></tbody>
</table>

</div>

<!-- AUDIO -->
<div id="audio" class="hidden">

<h2 class="text-2xl font-bold mb-4">Audio Player</h2>

<audio id="player" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<button onclick="playAudio()" class="bg-green-500 text-white px-4 py-2">Play</button>
<button onclick="pauseAudio()" class="bg-red-500 text-white px-4 py-2">Pause</button>

</div>

</div>

<script>

let ordini = JSON.parse(localStorage.getItem("ordini")) || []

function showSection(section) {
document.getElementById("dashboard").classList.add("hidden")
document.getElementById("ordini").classList.add("hidden")
document.getElementById("audio").classList.add("hidden")

document.getElementById(section).classList.remove("hidden")
}

function aggiungiOrdine() {

let cliente = document.getElementById("cliente").value
let prodotto = document.getElementById("prodotto").value
let prezzo = document.getElementById("prezzo").value

if(cliente === "" || prodotto === "" || prezzo === "") {
alert("Compila tutti i campi")
return
}

let ordine = {
id: Date.now(),
cliente,
prodotto,
prezzo
}

ordini.push(ordine)
localStorage.setItem("ordini", JSON.stringify(ordini))

renderOrdini()
}

function renderOrdini() {

let html = ""

ordini.forEach(o => {
html += `
<tr>
<td>${o.id}</td>
<td>${o.cliente}</td>
<td>${o.prodotto}</td>
<td>€ ${o.prezzo}</td>
</tr>
`
})

document.getElementById("listaOrdini").innerHTML = html
}

function playAudio() {
document.getElementById("player").play()
}

function pauseAudio() {
document.getElementById("player").pause()
}

renderOrdini()

</script>

</body>
</html>
